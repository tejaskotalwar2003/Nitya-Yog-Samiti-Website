
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Join Yoga Class - Nitya Yog Samiti</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f9f9;
}

/* NAVBAR */

nav{
background:#0f766e;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
color:white;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:20px;
font-weight:600;
}

.logo img{
width:60px;
background:white;
padding:5px;
border-radius:8px;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
}

/* LAYOUT */

.register-section{
display:flex;
min-height:100vh;
}

/* IMAGE SIDE */

.left-side{

flex:1;

background:
linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url("https://images.unsplash.com/photo-1506126613408-eca07ce68773");

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

color:white;
text-align:center;
padding:40px;

}

.left-side h1{
font-size:40px;
margin-bottom:10px;
}

/* FORM SIDE */

.right-side{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:40px;
}

.form-card{

background:white;
width:100%;
max-width:450px;

padding:35px;

border-radius:14px;

border-top:6px solid #14b8a6;

box-shadow:0 15px 40px rgba(0,0,0,0.1);

}

.form-card h2{
text-align:center;
margin-bottom:25px;
color:#0f766e;
}

/* INPUT */

.input-group{
position:relative;
margin-bottom:18px;
}

.input-group i{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#0f766e;
}

.input-group input,
.input-group textarea{

width:100%;
padding:12px 12px 12px 38px;

border-radius:6px;
border:1px solid #ccc;

font-size:14px;

}

textarea{
resize:none;
}

/* BUTTON */

button{

width:100%;
padding:14px;

background:linear-gradient(45deg,#0f766e,#14b8a6);

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

transition:0.3s;

}

button:hover{
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* POPUPS */

.popup{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.5);

justify-content:center;
align-items:center;

}

.popup-content{

background:white;

padding:35px;

border-radius:12px;

text-align:center;

max-width:350px;

}

.popup-content i{
font-size:50px;
margin-bottom:10px;
}

.success{
color:#14b8a6;
}

.loading{
color:#0f766e;
}

/* MOBILE */

@media(max-width:900px){

.register-section{
flex-direction:column;
}

.left-side{
height:250px;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">

<img src="/static/images/logo1.png">

<span>Nitya Yog Samiti</span>

</div>

<ul>

<li><a href="/">Home</a></li>
<li><a href="/aboutus">About</a></li>
<li><a href="/branches">Branches</a></li>
<li><a href="/reviews">Reviews</a></li>
<li><a href="/faq">FAQ</a></li>

</ul>

</nav>

<section class="register-section">

<div class="left-side">

<div>

<h1>Start Your Yoga Journey</h1>

<p>Join Nitya Yog Samiti and improve your health and peaceful life.</p>

</div>

</div>

<div class="right-side">

<div class="form-card">

<h2>Join Yoga Class</h2>

<form id="regForm">

<div class="input-group">
<i class="fa fa-user"></i>
<input type="text" name="name" placeholder="Full Name" required>
</div>

<div class="input-group">
<i class="fa fa-calendar"></i>
<input type="number" name="age" placeholder="Age" required>
</div>

<div class="input-group">
<i class="fa fa-phone"></i>
<input type="tel" name="mobile" placeholder="Mobile Number" required>
</div>

<div class="input-group">
<i class="fa fa-location-dot"></i>
<input type="text" name="address" placeholder="Address" required>
</div>

<div class="input-group">
<i class="fa fa-city"></i>
<input type="text" name="district" placeholder="District" required>
</div>

<div class="input-group">
<i class="fa fa-map"></i>
<input type="text" name="state" placeholder="State" required>
</div>

<div class="input-group">
<i class="fa fa-notes-medical"></i>
<textarea name="health_problem" rows="3" placeholder="Any health problem (optional)"></textarea>
</div>

<button type="submit">Register</button>

</form>

</div>

</div>

</section>

<!-- LOADING POPUP -->

<div id="loadingPopup" class="popup">

<div class="popup-content">

<i class="fa fa-spinner fa-spin loading"></i>

<h3>Registering...</h3>

<p>Please wait while we process your request</p>

</div>

</div>

<!-- SUCCESS POPUP -->

<div id="successPopup" class="popup">

<div class="popup-content">

<i class="fa fa-circle-check success"></i>

<h3>Registration Successful</h3>

<p>Redirecting to home page...</p>

</div>

</div>

<script>

const form=document.getElementById("regForm")

form.addEventListener("submit",async function(e){

e.preventDefault()

const formData=new FormData(form)

/* show loading */

document.getElementById("loadingPopup").style.display="flex"

try{

const response=await fetch("/submit_registration",{
method:"POST",
body:formData
})

const result=await response.json()

document.getElementById("loadingPopup").style.display="none"

if(result.Message){

document.getElementById("successPopup").style.display="flex"

form.reset()

setTimeout(()=>{
window.location.href="/"
},3000)

}

else if(result.error){
alert(result.error)
}

}catch(err){

document.getElementById("loadingPopup").style.display="none"

alert("Server error")

}

})

</script>

</body>

</html>
```
