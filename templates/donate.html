<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Donate - Nitya Yog</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(to right,#f0fdfa,#ecfeff);
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
padding:20px 8%;
background:white;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

nav a{
text-decoration:none;
color:#0f766e;
margin-left:15px;
font-weight:500;
}

/* HERO */
.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:42px;
color:#0f766e;
}

.hero p{
margin-top:10px;
color:#555;
}

/* LAYOUT */
.container{
display:flex;
gap:40px;
justify-content:center;
padding:40px;
flex-wrap:wrap;
}

/* CARD */
.card{
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
width:350px;
}

.card h2{
margin-bottom:20px;
color:#0f766e;
}

/* INPUT */
input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:12px;
border:1px solid #ddd;
}

/* AMOUNT */
.amounts{
display:flex;
gap:10px;
}

.amounts button{
flex:1;
padding:10px;
border:none;
border-radius:20px;
background:#e6fffa;
cursor:pointer;
}

.amounts button:hover{
background:#14b8a6;
color:white;
}

/* BUTTON */
.donate-btn{
width:100%;
padding:15px;
border:none;
border-radius:30px;
background:#14b8a6;
color:white;
font-size:16px;
margin-top:15px;
cursor:pointer;
}

/* TRUST */
.progress{
height:8px;
background:#ddd;
border-radius:20px;
margin:10px 0;
}

.progress-bar{
height:100%;
width:65%;
background:#14b8a6;
border-radius:20px;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:#0f766e;
color:white;
margin-top:40px;
}

/* MOBILE */
@media(max-width:768px){
.container{
flex-direction:column;
align-items:center;
}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<h2>Nitya Yog</h2>
<div>
<a href="index.html">Home</a>
<a href="#">Donate</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<h1>Support Our Mission 🙏</h1>
<p>Help us build a healthier community</p>
</section>

<!-- MAIN -->
<div class="container">

<!-- DONATE -->
<div class="card">

<h2>Donate Now</h2>

<input type="text" id="name" placeholder="Your Name">

<div class="amounts">
<button onclick="setAmount(100)">₹100</button>
<button onclick="setAmount(500)">₹500</button>
<button onclick="setAmount(1000)">₹1000</button>
</div>

<input type="number" id="amount" placeholder="Enter amount">

<button class="donate-btn" onclick="donate()">Donate</button>

<p style="font-size:12px;margin-top:10px;color:#777;">
🔒 Secure Payment Powered by Razorpay
</p>

</div>

<!-- TRUST -->
<div class="card">

<h2>Impact</h2>

<p>✔ Free Yoga Classes</p>
<p>✔ Mental Health Support</p>
<p>✔ Community Programs</p>

<div class="progress">
<div class="progress-bar"></div>
</div>

<p>₹65,000 raised</p>

</div>

</div>

<!-- FOOTER -->
<footer>
© 2026 Nitya Yog Samiti
</footer>

<script>

function setAmount(val){
document.getElementById("amount").value = val;
}

function donate(){

let amount = document.getElementById("amount").value;
let name = document.getElementById("name").value || "Supporter";

if(!amount){
alert("Enter amount");
return;
}

var options = {
  "key": "rzp_test_SaxX2UeOxwaNAv",  // 🔴 replace with your Razorpay key
  "amount": amount * 100,
  "currency": "INR",
  "name": "Nitya Yog Samiti",
  "description": "Donation",
  
  "handler": function (response){
    alert("Payment Successful ✅");
    window.location.href = "success.html";
  },

  "prefill": {
    "name": name
  },

  "theme": {
    "color": "#14b8a6"
  }
};

var rzp = new Razorpay(options);
rzp.open();

}

</script>

</body>
</html>
